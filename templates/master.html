{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    {%  block additional_css %}{% endblock %}

    <script src="{% static 'bundle.js' %}"></script>

    {%  block additional_scripts %}{% endblock %}
    <script type="text/javascript">
        {% block js %}{% endblock %}
    </script>
</head>
<body>
    <nav>
        <a href="{% url "homepage" %}">Home</a> |
        <a href="{% url "applications:application-list" %}">Job Applications</a> |
        <a href="{% url "about" %}">About</a>
    </nav>
    {% block subnav %}
    {% endblock %}
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
